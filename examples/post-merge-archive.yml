# Post-merge workflow that archives compliance reports and alerts on non-compliant merges
#
# Creates permanent audit trail at: compliance/pr-{num}-{ticket}-{slug}-{date}.json
# Sends Slack alert if a PR was merged without passing compliance
#
# Copy this to your repo's .github/workflows/ directory

name: Post-Merge Compliance Archive

on:
  pull_request:
    types: [closed]
    branches: [main, staging]

jobs:
  archive:
    # Only run if PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      archive_url: ${{ steps.commit.outputs.archive_url }}
      compliant: ${{ steps.archive.outputs.compliant }}
      confidence: ${{ steps.archive.outputs.confidence }}
      violations: ${{ steps.archive.outputs.violations }}
      dismissed_count: ${{ steps.archive.outputs.dismissed_count }}
      dismissed_summary: ${{ steps.archive.outputs.dismissed_summary }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Download compliance report artifact
        uses: actions/download-artifact@v4
        with:
          name: compliance-report-${{ github.event.pull_request.number }}
          path: ./artifact
        continue-on-error: true

      - name: Create compliance archive
        id: archive
        run: |
          mkdir -p compliance

          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          DATE=$(date -u +%Y%m%d)

          # Extract ticket ID from title (e.g., "PROJ-396: Description" -> "PROJ-396")
          TICKET=$(echo "$PR_TITLE" | grep -oE '^[A-Z]+-[0-9]+' | head -1)
          if [ -z "$TICKET" ]; then
            TICKET="no-ticket"
          fi

          # Create slug from title
          SLUG=$(echo "$PR_TITLE" | sed -E 's/^[A-Z]+-[0-9]+:?\s*//' | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-' | head -c 40)
          if [ -z "$SLUG" ]; then
            SLUG="merge"
          fi

          FILENAME="pr-${PR_NUM}-${TICKET}-${SLUG}-${DATE}.json"
          FILEPATH="compliance/${FILENAME}"

          if [ -f "./artifact/compliance_report.json" ]; then
            jq --arg pr "$PR_NUM" \
               --arg title "$PR_TITLE" \
               --arg ticket "$TICKET" \
               --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
               --arg branch "${{ github.event.pull_request.base.ref }}" \
               --arg author "${{ github.event.pull_request.merged_by.login }}" \
               --arg pr_url "${{ github.event.pull_request.html_url }}" \
               --arg head_sha "${{ github.event.pull_request.head.sha }}" \
               '. + {
                 archived_at: $ts,
                 pr_number: ($pr | tonumber),
                 pr_title: $title,
                 primary_ticket: $ticket,
                 pr_url: $pr_url,
                 target_branch: $branch,
                 merged_by: $author,
                 head_sha: $head_sha
               }' ./artifact/compliance_report.json > "$FILEPATH"

            # Extract compliance status for downstream jobs
            COMPLIANT=$(jq -r '.compliant // "unknown"' ./artifact/compliance_report.json)
            CONFIDENCE=$(jq -r '.confidence_percent // "?"' ./artifact/compliance_report.json)
            VIOLATIONS=$(jq -r '.summary // ""' ./artifact/compliance_report.json)
          else
            echo "Warning: No compliance artifact found, creating minimal record"
            COMPLIANT="unknown"
            VIOLATIONS="Compliance report not found — PR may predate compliance workflow"
            cat > "$FILEPATH" << EOF
          {
            "archived_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "pr_number": $PR_NUM,
            "pr_title": "$PR_TITLE",
            "primary_ticket": "$TICKET",
            "pr_url": "${{ github.event.pull_request.html_url }}",
            "target_branch": "${{ github.event.pull_request.base.ref }}",
            "merged_by": "${{ github.event.pull_request.merged_by.login }}",
            "head_sha": "${{ github.event.pull_request.head.sha }}",
            "compliant": null,
            "note": "Compliance report artifact not found"
          }
          EOF
          fi

          # Extract dismissed review findings
          if [ -f "./artifact/compliance_report.json" ]; then
            DISMISSED_COUNT=$(jq '[(.dismissed_reviews // [])[] ] | length' ./artifact/compliance_report.json 2>/dev/null || echo "0")
            DISMISSED_SUMMARY=$(jq -r '
              [(.dismissed_reviews // [])[0:3][]] | if length == 0 then "" else join(" · ") end
            ' ./artifact/compliance_report.json 2>/dev/null || echo "")
          else
            DISMISSED_COUNT="0"
            DISMISSED_SUMMARY=""
          fi

          echo "compliant=$COMPLIANT" >> $GITHUB_OUTPUT
          echo "confidence=$CONFIDENCE" >> $GITHUB_OUTPUT
          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "filepath=$FILEPATH" >> $GITHUB_OUTPUT
          echo "dismissed_count=$DISMISSED_COUNT" >> $GITHUB_OUTPUT
          echo "dismissed_summary=$DISMISSED_SUMMARY" >> $GITHUB_OUTPUT

      - name: Commit and push archive
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ${{ steps.archive.outputs.filepath }}

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "archive_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "compliance: archive PR #${{ github.event.pull_request.number }}

          Automated SOC2 compliance archive.
          PR: ${{ github.event.pull_request.html_url }}
          Title: ${{ github.event.pull_request.title }}
          Merged by: ${{ github.event.pull_request.merged_by.login }}"

          git pull --rebase
          git push

          ARCHIVE_URL="https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.base.ref }}/${{ steps.archive.outputs.filepath }}"
          echo "archive_url=$ARCHIVE_URL" >> $GITHUB_OUTPUT

  notify-slack:
    needs: archive
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured, skipping"
            exit 0
          fi

          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.merged_by.login }}"
          BASE="${{ github.event.pull_request.base.ref }}"
          ARCHIVE_URL="${{ needs.archive.outputs.archive_url }}"
          COMPLIANT="${{ needs.archive.outputs.compliant }}"
          CONFIDENCE="${{ needs.archive.outputs.confidence }}"
          VIOLATIONS="${{ needs.archive.outputs.violations }}"
          DISMISSED_COUNT="${{ needs.archive.outputs.dismissed_count }}"
          DISMISSED_SUMMARY="${{ needs.archive.outputs.dismissed_summary }}"

          # Build dismissed findings snippet for Slack
          DISMISSED_LINE=""
          if [ "${DISMISSED_COUNT:-0}" -gt 0 ] 2>/dev/null; then
            DISMISSED_LINE="\\n⚠️ ${DISMISSED_COUNT} dismissed review finding(s): ${DISMISSED_SUMMARY}"
          fi

          if [ "$COMPLIANT" = "false" ]; then
            # Non-compliant merge — alert
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"⚠️ *<${PR_URL}|PR #${PR_NUM}>* merged to \`${BASE}\` at *${CONFIDENCE}% compliance*\n${PR_TITLE}${DISMISSED_LINE}\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"${VIOLATIONS}\"
                    }
                  },
                  {
                    \"type\": \"context\",
                    \"elements\": [
                      {
                        \"type\": \"mrkdwn\",
                        \"text\": \"merged by @${AUTHOR} • <${ARCHIVE_URL}|📋 Compliance Report>\"
                      }
                    ]
                  }
                ]
              }"
          else
            # Compliant merge — normal notification
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"✅ *<${PR_URL}|PR #${PR_NUM}>* merged to \`${BASE}\` — *${CONFIDENCE}% compliance*\n${PR_TITLE}${DISMISSED_LINE}\"
                    }
                  },
                  {
                    \"type\": \"context\",
                    \"elements\": [
                      {
                        \"type\": \"mrkdwn\",
                        \"text\": \"by @${AUTHOR} • <${ARCHIVE_URL}|📋 Compliance Report>\"
                      }
                    ]
                  }
                ]
              }"
          fi
